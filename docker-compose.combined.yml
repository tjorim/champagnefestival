services:
  backend:
    build:
      context: ./backend
    container_name: champagne-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - champagne-data:/var/data/champagne
    expose:
      - "8000"

  frontend-build:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: champagne-frontend-build
    command: ["sh", "-lc", "cp -r /app/dist/* /out/"]
    volumes:
      - frontend-dist:/out

  nginx:
    image: nginx:1.27-alpine
    container_name: champagne-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend-build
    ports:
      - "80:80"
      # add 443 here if you terminate TLS in this container
    volumes:
      - ./deploy/nginx/champagne.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro

volumes:
  champagne-data:
  frontend-dist:
