# Local development only — do NOT use in production.
# Credentials below are intentionally hardcoded dev defaults.
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: champagne
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/champagne
      ENVIRONMENT: development
      # OIDC_ISSUER_URL is not required in development (admin endpoints return 401
      # until it's set). There's no local IdP in this compose file, so this points
      # at the real production Keycloak realm — the debug Android client's redirect
      # URI must be registered on that realm's client for login to complete.
      OIDC_ISSUER_URL: https://auth.tjor.im/realms/champagnefestival
      OIDC_AUDIENCE: champagnefestival
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    # Bind-mount host sources so --reload picks up edits without rebuilding.
    # A named volume at /app/.venv keeps the container virtualenv intact.
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  backend_venv:
