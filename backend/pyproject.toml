[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "champagnefestival-backend"
version = "0.1.0"
description = "FastAPI backend for the Champagne Festival reservation system"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "sqlalchemy>=2.0",
  "aiosqlite>=0.20",
  "alembic>=1.14",
  "pydantic[email]>=2.9",
  "pydantic-settings>=2.6",
  "python-dotenv>=1.0",
  "python-multipart>=0.0.18",
]

[dependency-groups]
dev = ["pytest>=8", "pytest-asyncio>=0.24", "httpx>=0.28", "anyio>=4", "ruff>=0.9", "ty>=0.0.1"]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501", "B008"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ty.rules]
unresolved-attribute = "warn"
