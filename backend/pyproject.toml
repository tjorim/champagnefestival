[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "champagnefestival-backend"
version = "0.1.0"
description = "FastAPI backend for the Champagne Festival reservation system"
requires-python = ">=3.13"
dependencies = [
  "fastapi>=0.136.0",
  "uvicorn[standard]>=0.44.0",
  "sqlalchemy>=2.0",
  "alembic>=1.14",
  "pydantic[email]>=2.13.2",
  "pydantic-settings>=2.6",
  "python-dotenv>=1.0",
  "python-multipart>=0.0.18",
  "phonenumbers>=9.0.26",
  "asyncpg>=0.30",
  "psycopg[binary]>=3.0",
  "supertokens-python>=0.31",
]

[dependency-groups]
dev = ["pytest>=8", "pytest-asyncio>=0.26.0", "httpx>=0.28", "anyio>=4", "ruff>=0.15.11", "ty>=0.0.32"]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
addopts = "-p no:anyio"
markers = ["anyio: marks tests as anyio-compatible (no-op under asyncio_mode=auto)"]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501", "B008"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ty.rules]
unresolved-attribute = "warn"