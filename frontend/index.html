<!doctype html>
<html lang="nl" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>%VITE_SITE_TITLE%</title>
    <meta name="title" content="%VITE_SITE_TITLE%" />
    <meta
      name="description"
      content="Champagnefestival - A celebration of fine champagne and community"
    />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#100f0d" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fbf4e6" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Champagnefestival Organization" />
    <meta name="keywords" content="champagne, festival, belgium, wine, tasting, event, community" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_PUBLIC_URL%" />
    <meta property="og:title" content="%VITE_SITE_TITLE%" />
    <meta
      property="og:description"
      content="Champagnefestival - A celebration of fine champagne and community"
    />
    <meta property="og:image" content="%VITE_PUBLIC_URL%/images/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="%VITE_PUBLIC_URL%" />
    <meta name="twitter:title" content="%VITE_SITE_TITLE%" />
    <meta
      name="twitter:description"
      content="Champagnefestival - A celebration of fine champagne and community"
    />
    <meta name="twitter:image" content="%VITE_PUBLIC_URL%/images/og-image.jpg" />

    <!-- Preload critical assets -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Optimized font loading - limit to needed weights -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <!-- Fallback for JS disabled browsers -->
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Language alternates for SEO -->
    <link rel="alternate" hreflang="en" href="%VITE_PUBLIC_URL%?lng=en" />
    <link rel="alternate" hreflang="fr" href="%VITE_PUBLIC_URL%?lng=fr" />
    <link rel="alternate" hreflang="nl" href="%VITE_PUBLIC_URL%" />
    <link rel="alternate" hreflang="x-default" href="%VITE_PUBLIC_URL%" />
    <link rel="canonical" href="%VITE_PUBLIC_URL%" />

    <!-- Bootstrap will be imported via JS -->
    <script>
      (() => {
        // Sets data-bs-theme (Bootstrap's own dark/light component colors) before first paint,
        // to avoid a flash. The theme stylesheet itself (colors/layout) is loaded from main.tsx,
        // after the bootstrap CSS import, so it lands later in the cascade — see useVisualTheme.ts.
        const VISUAL_THEME_KEY = "champagnefestival:visualTheme";
        let visualTheme = "refresh";
        try {
          const stored = window.localStorage.getItem(VISUAL_THEME_KEY);
          if (stored === "classic" || stored === "refresh") visualTheme = stored;
        } catch {}
        document.documentElement.dataset.visualTheme = visualTheme;

        const query = window.matchMedia("(prefers-color-scheme: light)");
        const applyTheme = () => {
          if (document.documentElement.dataset.visualTheme === "classic") {
            document.documentElement.dataset.bsTheme = "dark";
            return;
          }
          document.documentElement.dataset.bsTheme = query.matches ? "light" : "dark";
        };
        applyTheme();
        query.addEventListener?.("change", applyTheme);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
