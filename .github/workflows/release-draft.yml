name: Draft Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  validate-release-metadata:
    name: Validate tag, versions & changelog
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate CalVer tag
        id: semver
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Tag '$TAG' is invalid. Expected CalVer format: vYYYY.MM.MICRO"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # The root VERSION file is the single source of truth for the app version
      # (see app/version.py). frontend/package.json is checked separately below
      # since its sync step is silent; Android reads VERSION directly
      # (versionCodeFor() in android/app/build.gradle.kts) so there's nothing
      # further to validate for it.
      - name: Validate VERSION file matches tag
        env:
          EXPECTED_VERSION: ${{ steps.semver.outputs.version }}
        run: |
          set -euo pipefail
          FILE_VERSION="$(cat VERSION)"
          if [[ "$FILE_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "::error::VERSION file '$FILE_VERSION' does not match tag '$EXPECTED_VERSION'"
            exit 1
          fi

      # `pnpm build` auto-syncs frontend/package.json from VERSION
      # (frontend/scripts/sync-version.mjs), so the built artifact is always
      # correct — but that sync is silent, with no failure if the committed
      # package.json had drifted. Check it explicitly here too, so a stale
      # package.json fails the release the same way worktime's
      # check-version-consistency and daynest's tag check do, instead of
      # only ever being caught by an unrelated pnpm build side effect.
      - name: Validate frontend/package.json matches VERSION
        env:
          EXPECTED_VERSION: ${{ steps.semver.outputs.version }}
        run: |
          set -euo pipefail
          FRONTEND_VERSION="$(node -p "require('./frontend/package.json').version")"
          if [[ "$FRONTEND_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "::error::frontend/package.json version '$FRONTEND_VERSION' does not match '$EXPECTED_VERSION' — run 'pnpm run sync-version' in frontend/ and commit the result"
            exit 1
          fi

      - name: Validate CHANGELOG entry
        env:
          EXPECTED_VERSION: ${{ steps.semver.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! -f CHANGELOG.md ]]; then
            echo "::error::CHANGELOG.md not found."
            exit 1
          fi
          ESCAPED_VERSION="$(printf '%s' "$EXPECTED_VERSION" | sed 's/\./\\./g')"
          if ! grep -Eq "^## \[$ESCAPED_VERSION\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md; then
            echo "::error::CHANGELOG.md must contain an entry header: ## [$EXPECTED_VERSION] - YYYY-MM-DD"
            exit 1
          fi

  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    needs: validate-release-metadata
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_champagne
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_champagne
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_champagne
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format (ruff format)
        run: uv run ruff format --check .

      - name: Typecheck (ty)
        run: uv run ty check .

      - name: Migrate (alembic upgrade head)
        run: uv run alembic upgrade head

      - name: Test
        run: uv run pytest

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    needs: validate-release-metadata
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: frontend/.node-version
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (Paraglide + tsc)
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

  create-draft-release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs:
      - validate-release-metadata
      - backend-checks
      - frontend-checks
    steps:
      - name: Create draft release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ needs.validate-release-metadata.outputs.version }}
          draft: true
          generate_release_notes: true
