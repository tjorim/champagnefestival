name: PR Preview Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Build Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: pr-preview-${{ github.event.pull_request.number }}
          path: dist/
          retention-days: 7

      - name: Comment PR with preview link
        if: github.event.pull_request.head.repo.fork == false
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview-build
          message: |
            ## Preview Build

            A preview build for this PR is available as a downloadable artifact.

            **[Download preview build](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})** (select `pr-preview-${{ github.event.pull_request.number }}` from Artifacts)

            Built from ${{ github.event.pull_request.head.sha }}
