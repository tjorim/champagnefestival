name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "VERSION"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "VERSION"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Typecheck, Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: frontend/.node-version
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (Paraglide + tsc)
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Bundle size budget
        run: |
          # Generous ceilings — ~30% above the 2026-06-27 baseline.
          # Raise only after a deliberate, reviewed size increase.
          # Baselines (kB, uncompressed): total JS ≈ 1 654, index ≈ 785, AdminDashboard ≈ 517
          TOTAL_MAX_KB=2200
          INDEX_MAX_KB=1050
          ADMIN_MAX_KB=700

          total_kb=$(find dist/assets -name '*.js' -type f -printf '%s\n' | awk '{s+=$1} END{printf "%d", s/1024}')
          index_kb=$(find dist/assets -name 'index-*.js' -type f -printf '%s\n' | awk '{s+=$1} END{printf "%d", s/1024}')
          admin_kb=$(find dist/assets -name 'AdminDashboard-*.js' -type f -printf '%s\n' | awk '{s+=$1} END{printf "%d", s/1024}')

          echo "Total JS:       ${total_kb} kB  (budget: ${TOTAL_MAX_KB} kB)"
          echo "index chunk:    ${index_kb} kB  (budget: ${INDEX_MAX_KB} kB)"
          echo "AdminDashboard: ${admin_kb} kB  (budget: ${ADMIN_MAX_KB} kB)"

          failed=0
          if [ "$total_kb" -gt "$TOTAL_MAX_KB" ]; then
            echo "FAIL: total JS ${total_kb} kB exceeds budget ${TOTAL_MAX_KB} kB"
            failed=1
          fi
          if [ "$index_kb" -gt "$INDEX_MAX_KB" ]; then
            echo "FAIL: index chunk ${index_kb} kB exceeds budget ${INDEX_MAX_KB} kB"
            failed=1
          fi
          if [ "$admin_kb" -gt "$ADMIN_MAX_KB" ]; then
            echo "FAIL: AdminDashboard chunk ${admin_kb} kB exceeds budget ${ADMIN_MAX_KB} kB"
            failed=1
          fi
          [ "$failed" -eq 0 ] && echo "All chunks within budget."
          exit $failed

  e2e:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: frontend/.node-version
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile Paraglide messages
        run: pnpm run paraglide:compile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
