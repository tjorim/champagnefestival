version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    versioning-strategy: "increase"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      bootstrap:
        patterns:
          - "bootstrap"
          - "bootstrap-icons"
          - "react-bootstrap"
      vite:
        patterns:
          - "vite"
          - "@vitejs/plugin-react"
      testing:
        patterns:
          - "@testing-library/*"
          - "@vitest/*"
          - "vitest"
      oxc:
        patterns:
          - "oxlint"
          - "oxfmt"
      i18n:
        patterns:
          - "@inlang/*"
      maps:
        patterns:
          - "leaflet"
          - "react-leaflet"
          - "@types/leaflet"

  # Monitor Python dependencies for backend API
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps(backend)"
      include: "scope"
    labels:
      - "dependencies"
      - "backend"
      - "python"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    assignees:
      - "tjorim"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
