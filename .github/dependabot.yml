version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    versioning-strategy: "increase"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      bootstrap:
        patterns:
          - "bootstrap"
          - "bootstrap-icons"
          - "react-bootstrap"
      vite:
        patterns:
          - "vite"
          - "@vitejs/plugin-react"
      testing:
        patterns:
          - "@testing-library/*"
          - "@vitest/*"
          - "vitest"
      oxc:
        patterns:
          - "oxlint"
          - "oxfmt"
      i18n:
        patterns:
          - "@inlang/*"
      maps:
        patterns:
          - "leaflet"
          - "react-leaflet"
          - "@types/leaflet"
      # Group TanStack table packages (must update together or pipelines fail)
      tanstack-table:
        patterns:
          - "@tanstack/react-table"
          - "@tanstack/table-core"
      # Group TanStack DB packages (both depend on @tanstack/db; mismatched versions cause type errors)
      tanstack-db:
        patterns:
          - "@tanstack/react-db"
          - "@tanstack/query-db-collection"
      # Group dnd-kit packages (share internal deps; mismatched versions cause type errors)
      dnd-kit:
        patterns:
          - "@dnd-kit/*"

  # Monitor uv-managed Python dependencies for backend API
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps(backend)"
      include: "scope"
    labels:
      - "dependencies"
      - "backend"
      - "python"
    versioning-strategy: "increase"

  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps(android)"
      include: "scope"
    labels:
      - "dependencies"
      - "android"

  - package-ecosystem: "docker"
    directories:
      - "/backend"
      - "/frontend"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps(compose)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
