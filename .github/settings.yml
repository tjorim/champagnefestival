# Managed by the GitHub Settings app (probot/settings) when installed.
# Keeps branch protection required checks aligned with workflow design.
branches:
  - name: main
    protection:
      enforce_admins: true
      required_status_checks:
        strict: true
        contexts:
          - "CI / Typecheck & Lint (Node 20)"
          - "CI / Test & Build (Node 20)"
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
